{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale-1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
    <div class="formulario">
        <h1>Registro</h1>
        <form method="post" action="{% url 'registro_view' %}">
            {% csrf_token %}
            <div class="username">
                <input type="text" name="nombre_completo" id="id_nombre_completo" required>
                <label for="id_nombre_completo">Nombre Completo</label>
            </div>
            <div class="username">
                <input type="text" name="username" id="id_username" required>
                <label for="id_username">Nombre de usuario</label>
            </div>
            <div class="username">
                <input type="email" name="correo_electronico" id="id_correo_electronico" required>
                <label for="id_correo_electronico">Correo electronico</label>
            </div>
            <div class="username">
                <input type="password" name="password" id="id_password" required>
                <label for="id_password">contraseña</label>
            </div>
            <div class="username">
                <input type="password" name="password2" id="id_password2" required>
                <label for="id_password2">repita la contraseña</label>
            </div>
            <input type="submit" value="Registrarse">
            <div class="registrarse">
                Ya tienes cuenta inicia sesion <a href="login.html">aqui</a>
            </div>
        </form>

    </div>
</body>
</html>
